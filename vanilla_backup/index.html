<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>접지관리 시스템 - 154kV 이천-가남 T/L</title>
  <meta name="description" content="가공송전선로 설치공사 접지개소 주접지 및 보조접지 관리 시스템">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="app-header">
      <div class="header-content">
        <div class="header-left">
          <div class="logo-icon">⚡</div>
          <div class="header-text">
            <h1 id="main-title">접지관리 시스템</h1>
            <p class="project-name">154kV 이천-가남 등 2개T/L</p>
          </div>
        </div>
        <div class="header-right">
          <div class="circuit-toggle">
            <button class="circuit-btn active" id="btn-circuit-1" onclick="setCircuit(1)">1회선</button>
            <button class="circuit-btn" id="btn-circuit-2" onclick="setCircuit(2)">2회선</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button id="btn-dashboard" class="nav-btn active" onclick="showView('dashboard')">
        <span class="btn-icon">📊</span>
        <span class="btn-label">대시보드</span>
      </button>
      <button id="btn-towers" class="nav-btn" onclick="showView('towers')">
        <span class="btn-icon">🗼</span>
        <span class="btn-label">철탑목록</span>
      </button>
    </nav>

    <!-- Dashboard View -->
    <section id="view-dashboard" class="view active">
      <div class="dashboard-container">
        
        <!-- 사업 현황 Card -->
        <div class="glass-card" style="padding: 1.5rem; margin-bottom: 1.25rem; background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(241,245,249,0.8) 100%); position: relative; overflow: hidden;">
          <!-- Decorative background glow -->
          <div style="position: absolute; top: -50px; right: -50px; width: 100px; height: 100px; background: var(--primary); opacity: 0.1; filter: blur(50px); border-radius: 50%;"></div>
          
          <div style="display:flex; align-items:center; gap: 0.75rem; margin-bottom: 1.25rem;">
            <div style="display:flex; align-items:center; justify-content:center; width: 36px; height: 36px; background: rgba(59, 130, 246, 0.1); border-radius: 10px; border: 1px solid rgba(59, 130, 246, 0.2);">
              <span style="font-size:1.1rem; color: #3b82f6;">📍</span>
            </div>
            <h2 style="font-size: 1.15rem; font-weight: 700; margin: 0; color: var(--text-main);">공사 개요</h2>
          </div>
          
          <div style="display:flex; flex-direction:column; gap: 1.25rem;">
            <div>
              <span style="display:block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.35rem; font-weight: 500;">사업명</span>
              <span style="display:inline-block; font-size: 0.95rem; font-weight: 600; color: var(--text-main); line-height: 1.4;">154kV 이천-가남 등 2개T/L 용량증대 선종교체공사</span>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
              <div style="background: rgba(0,0,0,0.02); padding: 0.85rem; border-radius: 10px; border: 1px solid var(--card-border);">
                <span style="display:block; font-size: 0.7rem; color: var(--text-muted); padding-bottom:0.2rem">선로명</span>
                <span style="display:block; font-size: 0.95rem; font-weight: 700; color: var(--text-main);">154kV 이천-가남 T/L</span>
              </div>
              <div style="background: rgba(0,0,0,0.02); padding: 0.85rem; border-radius: 10px; border: 1px solid var(--card-border);">
                <span style="display:block; font-size: 0.7rem; color: var(--text-muted); padding-bottom:0.2rem">총 철탑수</span>
                <div style="display:flex; align-items:baseline; gap: 0.25rem;">
                   <span style="font-size: 1.1rem; font-weight: 800; color: var(--primary);" id="dash-total-towers">26</span>
                   <span style="font-size: 0.8rem; color: var(--text-muted);">기</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="glass-card" style="padding: 1.5rem;">
          <h3 class="section-title" style="margin-top:0; border-bottom: 1px solid var(--card-border); padding-bottom: 0.75rem; margin-bottom: 1.25rem;">
            접지 현황 (<span id="dashboard-circuit-label">1회선</span>)
          </h3>
          
          <div style="display:flex; flex-direction:column; gap: 1rem;">
            <!-- 총 대상 -->
            <div style="display:flex; justify-content:space-between; align-items:center; background: rgba(0,0,0,0.03); padding: 1rem; border-radius: 12px; border: 1px solid var(--card-border);">
              <span style="font-size: 1rem; color: var(--text-muted);">총 대상개소 <small>(비대상 제외)</small></span>
              <span style="font-size: 1.5rem; font-weight: bold; font-variant-numeric: tabular-nums;" id="stat-total">0</span>
            </div>
            
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem;">
              <div style="background: rgba(0,0,0,0.02); padding: 0.75rem 0.5rem; border-radius: 12px; display:flex; flex-direction:column; align-items:center; border: 1px solid var(--card-border);">
                <span style="font-size: 0.75rem; color: var(--status-none); margin-bottom:0.25rem">미등록</span>
                <span style="font-size: 1.3rem; font-weight: 700; color: var(--status-none);" id="stat-none">0</span>
              </div>
              
              <div style="background: rgba(239, 68, 68, 0.1); padding: 0.75rem 0.5rem; border-radius: 12px; display:flex; flex-direction:column; align-items:center; border: 1px solid rgba(239, 68, 68, 0.3);">
                <span style="font-size: 0.75rem; color: var(--status-grounding); margin-bottom:0.25rem">접지개소(설치)</span>
                <span style="font-size: 1.3rem; font-weight: 700; color: var(--status-grounding);" id="stat-grounding">0</span>
              </div>
              
              <div style="background: rgba(16, 185, 129, 0.1); padding: 0.75rem 0.5rem; border-radius: 12px; display:flex; flex-direction:column; align-items:center; border: 1px solid rgba(16, 185, 129, 0.3);">
                <span style="font-size: 0.75rem; color: var(--status-removed); margin-bottom:0.25rem">작업완료(철거)</span>
                <span style="font-size: 1.3rem; font-weight: 700; color: var(--status-removed);" id="stat-removed">0</span>
              </div>
            </div>
            
            <!-- 진행률 표시 -->
            <div style="margin-top: 1rem;">
               <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-muted); margin-bottom:0.5rem;">
                 <span>전체 작업 진척도 (작업완료 기준)</span>
                 <span id="stat-progress-pct" style="color:var(--text-main); font-weight:bold;">0%</span>
               </div>
               <div class="progress-track" style="height: 12px;">
                 <div class="progress-fill secondary" id="bar-main-progress" style="width: 0%;"></div>
               </div>
            </div>
            
          </div>
        </div>

      </div>
    </section>

    <!-- Tower List View -->
    <section id="view-towers" class="view">
      <div class="towers-container">
        <div class="towers-toolbar">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="tower-search" placeholder="철탑번호 검색..." oninput="filterTowers()">
          </div>
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
            <button class="filter-btn" data-filter="none" onclick="setFilter('none')">미등록</button>
            <button class="filter-btn" data-filter="grounding" onclick="setFilter('grounding')">접지중</button>
            <button class="filter-btn" data-filter="removed" onclick="setFilter('removed')">작업완료</button>
            <button class="filter-btn" data-filter="exempt" onclick="setFilter('exempt')">비대상포함</button>
          </div>
        </div>
        <div id="tower-list" class="tower-list"></div>
      </div>
    </section>

    <!-- Tower Detail Modal -->
    <div id="tower-modal" class="modal-overlay" onclick="closeModalOutside(event)">
      <div class="modal-content glass-card">
        <div class="modal-header">
          <h2 id="modal-tower-title">철탑 정보</h2>
          <div style="display:flex; gap:0.5rem">
            <button class="modal-close" onclick="closeModal()">✕</button>
          </div>
        </div>
        <div class="modal-body" id="modal-body">
          <!-- Dynamic content -->
        </div>
      </div>
    </div>

    <!-- Photo Upload Modal -->
    <div id="upload-modal" class="modal-overlay" onclick="closeUploadModalOutside(event)">
      <div class="modal-content upload-modal-content glass-card">
        <div class="modal-header">
          <h2 id="upload-modal-title">사진 업로드</h2>
          <button class="modal-close" onclick="closeUploadModal()">✕</button>
        </div>
        <div class="upload-body">
          <div class="upload-type-selector">
            <button class="upload-type-btn active" id="btn-install" onclick="setUploadType('install')">
              <span class="type-icon">📸</span>
              <span>설치사진</span>
              <small>접지개소로 표시</small>
            </button>
            <button class="upload-type-btn" id="btn-remove" onclick="setUploadType('remove')">
              <span class="type-icon">🔧</span>
              <span>철거사진</span>
              <small>작업완료로 표시</small>
            </button>
          </div>
          <div class="upload-zone" id="upload-zone" onclick="triggerFileInput()">
            <div class="upload-placeholder" id="upload-placeholder">
              <span class="upload-icon">📷</span>
              <p>클릭하여 사진을 선택하세요</p>
              <small>사진은 자동으로 압축됩니다</small>
            </div>
            <div class="upload-preview" id="upload-preview" style="display:none">
              <img id="preview-img" src="" alt="미리보기">
              <div class="preview-info" id="preview-info"></div>
            </div>
          </div>
          <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handleFileSelect(event)" style="display:none">
          <div class="upload-actions">
            <button class="btn-cancel" onclick="closeUploadModal()">취소</button>
            <button class="btn-upload" id="btn-do-upload" onclick="doUpload()" disabled>
              <span class="upload-spinner" id="upload-spinner" style="display:none"></span>
              업로드
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Photo View Modal -->
    <div id="photo-modal" class="modal-overlay" onclick="closePhotoModal()">
      <div class="photo-modal-content glass-card">
        <div class="modal-header" style="width: 100%; border-radius:12px 12px 0 0;">
          <h2 style="font-size: 1.1rem" id="modal-photo-title">기록 보기</h2>
          <button class="modal-close" onclick="closePhotoModal()">✕</button>
        </div>
        <div style="padding: 1rem; width: 100%; text-align:center;">
          <img id="photo-view-img" src="" alt="접지 사진" style="max-width:100%; max-height:60vh; border-radius:8px;">
          <div class="photo-info" id="photo-view-info" style="margin-bottom:1rem;"></div>
          <button class="photo-btn danger" onclick="deleteCurrentPhoto()" style="width: 100%; justify-content:center; padding:1rem; font-size:1rem; font-weight:bold;">
            🗑️ 현재 사진 및 기록 삭제
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
